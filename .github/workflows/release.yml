name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (patch, minor, major, or 'none' to use current)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: patch

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          if [ "${{ github.event.inputs.bump }}" = "none" ]; then
            NEW_VERSION="$CURRENT"
            echo "Using current version: $NEW_VERSION"
          else
            npm version ${{ github.event.inputs.bump }} --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "Bumped to: $NEW_VERSION"
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "release: v${{ steps.bump.outputs.NEW_VERSION }}"
          git tag -a "v${{ steps.bump.outputs.NEW_VERSION }}" -m "v${{ steps.bump.outputs.NEW_VERSION }}"

      - name: Push
        run: git push origin main --follow-tags

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.NEW_VERSION }}
          name: v${{ steps.bump.outputs.NEW_VERSION }}
          generate_release_notes: true
          draft: false
